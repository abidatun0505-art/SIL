<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Pemeriksaan Laboratorium</title>
    <!-- Menggunakan Tailwind CSS CDN untuk styling yang cepat dan modern -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-3xl mx-auto my-10 px-4">
        <!-- Header Card -->
        <div class="bg-gradient-to-r from-teal-600 to-emerald-600 rounded-t-2xl p-6 md:p-8 shadow-md text-white">
            <h1 class="text-2xl md:text-3xl font-bold tracking-wide text-center uppercase">Formulir Pendaftaran Pemeriksaan Laboratorium</h1>
            <p class="text-teal-100 text-sm text-center mt-2">Silakan isi data di bawah ini dengan lengkap dan benar untuk menjadwalkan pemeriksaan.</p>
        </div>

        <!-- Form Card -->
        <form id="labForm" class="bg-white rounded-b-2xl p-6 md:p-8 shadow-xl border-x border-b border-slate-100 space-y-8">
            
            <!-- BAGIAN A: DATA PASIEN -->
            <section class="space-y-4">
                <div class="flex items-center space-x-2 border-b border-teal-500 pb-2">
                    <span class="bg-teal-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold text-sm">A</span>
                    <h2 class="text-lg font-bold text-teal-700 uppercase tracking-wide">Data Pasien</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap <span class="text-red-500">*</span></label>
                        <input type="text" required class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nomor Induk Kependudukan (NIK) <span class="text-red-500">*</span></label>
                        <input type="text" required pattern="[0-9]{16}" title="NIK harus berupa 16 digit angka" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" placeholder="16 Digit Angka">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Jenis Kelamin <span class="text-red-500">*</span></label>
                        <div class="mt-2 flex space-x-4">
                            <label class="inline-flex items-center">
                                <input type="radio" name="jenis_kelamin" required class="text-teal-600 focus:ring-teal-500 h-4 w-4">
                                <span class="ml-2 text-sm text-slate-700">Laki-laki</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="radio" name="jenis_kelamin" class="text-teal-600 focus:ring-teal-500 h-4 w-4">
                                <span class="ml-2 text-sm text-slate-700">Perempuan</span>
                            </label>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tempat Lahir <span class="text-red-500">*</span></label>
                            <input type="text" required class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Lahir <span class="text-red-500">*</span></label>
                            <input type="date" required class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Umur (Tahun) <span class="text-red-500">*</span></label>
                        <input type="number" required min="0" max="120" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nomor Telepon / WhatsApp <span class="text-red-500">*</span></label>
                        <input type="tel" required class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" placeholder="Contoh: 08123456xxx">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email <span class="text-slate-400 font-normal">(Opsional)</span></label>
                        <input type="email" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" placeholder="alamat@email.com">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Alamat Lengkap <span class="text-red-500">*</span></label>
                        <textarea required rows="3" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500"></textarea>
                    </div>
                </div>
            </section>

            <!-- BAGIAN B: INFORMASI PEMERIKSAAN -->
            <section class="space-y-4">
                <div class="flex items-center space-x-2 border-b border-teal-500 pb-2">
                    <span class="bg-teal-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold text-sm">B</span>
                    <h2 class="text-lg font-bold text-teal-700 uppercase tracking-wide">Informasi Pemeriksaan</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nomor Rekam Medis <span class="text-slate-400 font-normal">(Jika Ada)</span></label>
                        <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nama Dokter Pengirim</label>
                        <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Asal Klinik / Rumah Sakit</label>
                        <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Pemeriksaan yang Diinginkan <span class="text-red-500">*</span></label>
                        <input type="date" required class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Waktu Pemeriksaan <span class="text-red-500">*</span></label>
                        <div class="mt-2 grid grid-cols-1 sm:grid-cols-3 gap-2">
                            <label class="flex items-center p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-teal-50 transition-colors">
                                <input type="radio" name="waktu_pemeriksaan" required class="text-teal-600 focus:ring-teal-500 h-4 w-4">
                                <span class="ml-2 text-sm text-slate-700">Pagi (07.00 – 10.00)</span>
                            </label>
                            <label class="flex items-center p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-teal-50 transition-colors">
                                <input type="radio" name="waktu_pemeriksaan" class="text-teal-600 focus:ring-teal-500 h-4 w-4">
                                <span class="ml-2 text-sm text-slate-700">Siang (10.00 – 13.00)</span>
                            </label>
                            <label class="flex items-center p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-teal-50 transition-colors">
                                <input type="radio" name="waktu_pemeriksaan" class="text-teal-600 focus:ring-teal-500 h-4 w-4">
                                <span class="ml-2 text-sm text-slate-700">Sore (13.00 – 15.00)</span>
                            </label>
                        </div>
                    </div>
                </div>
            </section>

            <!-- BAGIAN C: JENIS PEMERIKSAAN -->
            <section class="space-y-4">
                <div class="flex items-center space-x-2 border-b border-teal-500 pb-2">
                    <span class="bg-teal-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold text-sm">C</span>
                    <h2 class="text-lg font-bold text-teal-700 uppercase tracking-wide">Jenis Pemeriksaan</h2>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-3">Pilih Pemeriksaan yang Diinginkan (Bisa memilih lebih dari satu):</label>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                        <!-- Item Panel -->
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">Hematologi Lengkap</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">Gula Darah Sewaktu</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">Gula Darah Puasa</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">HbA1c</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">Kolesterol Total</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">Trigliserida</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">Asam Urat</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">Fungsi Hati (SGOT/SGPT)</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">Fungsi Ginjal (Ureum/Kreatinin)</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">Urinalisis</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">Tes Kehamilan</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">HIV</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">HBsAg</span>
                        </label>
                        <label class="flex items-center p-2 rounded hover:bg-slate-50 transition-colors cursor-pointer">
                            <input type="checkbox" class="rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                            <span class="ml-2 text-sm text-slate-700">Anti-HCV</span>
                        </label>
                    </div>
                    <div class="mt-4">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Pemeriksaan Lainnya:</label>
                        <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" placeholder="Sebutkan jika tidak ada pada daftar di atas">
                    </div>
                </div>
            </section>

            <!-- BAGIAN D: PERSIAPAN PEMERIKSAAN -->
            <section class="space-y-4">
                <div class="flex items-center space-x-2 border-b border-teal-500 pb-2">
                    <span class="bg-teal-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold text-sm">D</span>
                    <h2 class="text-lg font-bold text-teal-700 uppercase tracking-wide">Persiapan Pemeriksaan</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Apakah Anda sedang berpuasa? <span class="text-red-500">*</span></label>
                        <div class="mt-2 flex space-x-6">
                            <label class="inline-flex items-center">
                                <input type="radio" name="puasa" required class="text-teal-600 focus:ring-teal-500 h-4 w-4">
                                <span class="ml-2 text-sm text-slate-700">Ya</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="radio" name="puasa" class="text-teal-600 focus:ring-teal-500 h-4 w-4">
                                <span class="ml-2 text-sm text-slate-700">Tidak</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Apakah sedang mengonsumsi obat tertentu? <span class="text-red-500">*</span></label>
                        <div class="mt-2 flex space-x-6">
                            <label class="inline-flex items-center">
                                <input type="radio" name="konsumsi_obat" id="obat_ya" required class="text-teal-600 focus:ring-teal-500 h-4 w-4">
                                <span class="ml-2 text-sm text-slate-700">Ya</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="radio" name="konsumsi_obat" id="obat_tidak" class="text-teal-600 focus:ring-teal-500 h-4 w-4">
                                <span class="ml-2 text-sm text-slate-700">Tidak</span>
                            </label>
                        </div>
                        <div id="detail_obat_container" class="mt-3 hidden transition-all">
                            <label class="block text-sm font-medium text-slate-600 mb-1">Jika Ya, sebutkan nama obat:</label>
                            <input type="text" id="detail_obat" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" placeholder="Nama obat / vitamin">
                        </div>
                    </div>
                </div>
            </section>

            <!-- BAGIAN E: PERSETUJUAN -->
            <section class="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                <div class="flex items-center space-x-2 border-b border-slate-300 pb-2">
                    <span class="bg-slate-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold text-sm">E</span>
                    <h2 class="text-md font-bold text-slate-700 uppercase tracking-wide">Persetujuan</h2>
                </div>
                
                <div class="space-y-3">
                    <label class="flex items-start cursor-pointer">
                        <input type="checkbox" required class="mt-1 rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                        <span class="ml-3 text-sm text-slate-600 leading-tight">Saya menyatakan bahwa data yang saya isi adalah benar.</span>
                    </label>
                    <label class="flex items-start cursor-pointer">
                        <input type="checkbox" required class="mt-1 rounded text-teal-600 focus:ring-teal-500 h-4 w-4">
                        <span class="ml-3 text-sm text-slate-600 leading-tight">Saya bersedia mengikuti prosedur pemeriksaan laboratorium sesuai ketentuan yang berlaku.</span>
                    </label>
                </div>
            </section>

            <!-- SUBMIT BUTTON -->
            <div class="pt-4">
                <button type="submit" class="w-full bg-gradient-to-r from-teal-600 to-emerald-600 text-white font-bold py-3 px-6 rounded-xl hover:from-teal-700 hover:to-emerald-700 focus:outline-none focus:ring-4 focus:ring-teal-200 active:scale-[0.99] transition-all text-center shadow-lg uppercase tracking-wider">
                    Kirim Pendaftaran
                </button>
            </div>
        </form>
    </div>

    <!-- SCRIPT LOGIKA FORM -->
    <script>
        // Logika untuk menampilkan input teks detail obat secara dinamis jika memilih 'Ya'
        const obatYa = document.getElementById('obat_ya');
        const obatTidak = document.getElementById('obat_tidak');
        const detailObatContainer = document.getElementById('detail_obat_container');
        const detailObatInput = document.getElementById('detail_obat');

        obatYa.addEventListener('change', function() {
            if(this.checked) {
                detailObatContainer.classList.remove('hidden');
                detailObatInput.setAttribute('required', 'true');
            }
        });

        obatTidak.addEventListener('change', function() {
            if(this.checked) {
                detailObatContainer.classList.add('hidden');
                detailObatInput.removeAttribute('required');
                detailObatInput.value = '';
            }
        });

        // Simulasi pengiriman form
        document.getElementById('labForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Pendaftaran Berhasil Dikirim! Terima kasih telah melakukan pengisian formulir.');
            // Di sini kamu bisa menambahkan fungsi untuk mengirim data ke database atau WhatsApp blast jika diperlukan.
            this.reset();
            detailObatContainer.classList.add('hidden');
        });
    </script>
</body>
</html>
